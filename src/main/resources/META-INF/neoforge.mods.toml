modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"
[[accessTransformers]]
file = "META-INF/accesstransformer.cfg"

[[mixins]]
config = "trainsystemutilities.mixins.json"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "trainsystemutilitieslogo.png"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies.${mod_id}]]
    modId = "manta"
    type = "required"
    versionRange = "[1.0.0,2)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neo_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "create"
    type = "required"
    versionRange = "[0.5,)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "geckolib"
    type = "required"
    versionRange = "[4.7,)"
    ordering = "AFTER"
    side = "BOTH"
